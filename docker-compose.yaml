services:
  # broker for celery
  rabbitmq:
    restart: unless-stopped
    image: docker.io/rabbitmq:3.11.5-alpine
    container_name: nomad_rabbitmq
    environment:
      - RABBITMQ_ERLANG_COOKIE=SWQOKODSQALRPCLNMEQG
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=rabbitmq
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - 5672:5672
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "--silent", "--quiet", "ping"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s

  # the search engine
  elastic:
    restart: unless-stopped
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: nomad_elastic
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - discovery.type=single-node
    volumes:
      - elastic:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "http://elastic:9200/_cat/health"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # the user data db
  mongo:
    restart: unless-stopped
    image: docker.io/mongo:5.0.6
    container_name: nomad_mongo
    environment:
      - MONGO_DATA_DIR=/data/db
      - MONGO_LOG_DIR=/dev/null
    ports:
      - 27017:27017
    volumes:
      - mongo:/data/db
      - ./.volumes/mongo:/backup
    command: mongod --logpath=/dev/null # --quiet
    healthcheck:
      test:
        - "CMD"
        - "mongo"
        - "mongo:27017/test"
        - "--quiet"
        - "--eval"
        - "'db.runCommand({ping:1}).ok'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s

  postgresql:
    container_name: nomad_postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    image: docker.io/postgres:16
    volumes:
      - postgresql:/var/lib/postgresql/data

  temporal:
    container_name: nomad_temporal
    image: docker.io/temporalio/auto-setup:1.28
    depends_on:
      - postgresql
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    healthcheck:
      test: >
        bash -c '
          temporal operator cluster health --address $$(hostname -i):7233 |
          grep -q "SERVING"
        '
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # nomad worker (processing)
  worker:
    restart: always
    build:
      context: ./packages/nomad-FAIR/
      dockerfile: Dockerfile
    # restart: unless-stopped
    # image: ghcr.io/fairmat-nfdi/nomad-distro-template:main
    platform: linux/amd64
    environment:
      NOMAD_SERVICE: nomad_worker
      NOMAD_RABBITMQ_HOST: rabbitmq
      NOMAD_ELASTIC_HOST: elastic
      NOMAD_MONGO_HOST: mongo
      NOMAD_LOGSTASH_HOST: logtransfer
      NOMAD_TEMPORAL_HOST: temporal
    env_file:
      - ./.env
    depends_on:
      temporal:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elastic:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./configs/nomad.yaml:/app/nomad.yaml
      - ./.volumes/fs:/app/.volumes/fs
    command: python -m nomad.cli admin run action-internal-worker
    healthcheck:
      # See https://keithtenzer.com/temporal/Deploying_Temporal_Worker_on_Kubernetes/#liveliness-and-readiness-probes
      # for rationale on using 'ls /' as a liveness/readiness probe for Temporal workers.
      test: ls /
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "4.0" # Maximum 4 CPU cores
          memory: 8G # Maximum 8GB RAM
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 15
        window: 1800s

  ## nomad gpu worker (actions)
  # gpu_worker:
  #   restart: unless-stopped
  #   image: ghcr.io/fairmat-nfdi/nomad-distro-template/gpu-action:main
  #   platform: linux/amd64
  #   container_name: nomad_gpu_worker
  #   env_file:
  #     - ./.env
  #   deploy:
  #     replicas: 1
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all # Use all available GPUs
  #             capabilities: [gpu]
  #   environment:
  #     NOMAD_SERVICE: nomad_gpu_worker
  #     NOMAD_RABBITMQ_HOST: rabbitmq
  #     NOMAD_ELASTIC_HOST: elastic
  #     NOMAD_MONGO_HOST: mongo
  #     NOMAD_LOGSTASH_HOST: logtransfer
  #     NOMAD_TEMPORAL_HOST: temporal
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     elastic:
  #       condition: service_healthy
  #     mongo:
  #       condition: service_healthy
  #     temporal:
  #       condition: service_healthy
  #   volumes:
  #     # - ./configs/nomad.yaml:/app/nomad.yaml
  #     - ./.volumes/fs:/app/.volumes/fs
  #   command: python -m nomad.cli admin run action-gpu-worker

  # # nomad cpu worker (actions)
  # cpu_worker:
  #   restart: unless-stopped
  #   image: ghcr.io/fairmat-nfdi/nomad-distro-template/cpu-action:main
  #   platform: linux/amd64
  #   container_name: nomad_cpu_worker
  #   env_file:
  #     - ./.env
  #   environment:
  #     NOMAD_SERVICE: nomad_cpu_worker
  #     NOMAD_RABBITMQ_HOST: rabbitmq
  #     NOMAD_ELASTIC_HOST: elastic
  #     NOMAD_MONGO_HOST: mongo
  #     NOMAD_LOGSTASH_HOST: logtransfer
  #     NOMAD_TEMPORAL_HOST: temporal
  #   deploy:
  #     replicas: 1
