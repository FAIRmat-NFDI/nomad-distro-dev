  #       limits:
  #         cpus: "2.0" # Maximum 2 CPU cores
  #         memory: 8G # Maximum 8GB RAM
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     elastic:
  #       condition: service_healthy
  #     mongo:
  #       condition: service_healthy
  #     temporal:
  #       condition: service_healthy
  #   volumes:
  #     # - ./configs/nomad.yaml:/app/nomad.yaml
  #     - ./.volumes/fs:/app/.volumes/fs
  #   command: python -m nomad.cli admin run action-cpu-worker

  # nomad app (api + proxy)
  app:
    restart: always
    build:
      context: ./packages/nomad-FAIR/
      dockerfile: Dockerfile
    # restart: unless-stopped
    # image: ghcr.io/fairmat-nfdi/nomad-distro-template:main
    platform: linux/amd64
    container_name: nomad_app
    environment:
      NOMAD_SERVICE: nomad_app
      NOMAD_SERVICES_API_PORT: 80
      NOMAD_FS_EXTERNAL_WORKING_DIRECTORY: "$PWD"
      NOMAD_RABBITMQ_HOST: rabbitmq
      NOMAD_ELASTIC_HOST: elastic
      NOMAD_MONGO_HOST: mongo
      NOMAD_LOGSTASH_HOST: logtransfer
      NOMAD_NORTH_HUB_HOST: north
      NOMAD_TEMPORAL_HOST: temporal
    env_file:
      - ./.env
    ports:
      - 8000:8000
    depends_on:
      temporal:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elastic:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./configs/nomad.yaml:/app/nomad.yaml
      - ./.volumes/fs:/app/.volumes/fs
    command: python -m nomad.cli admin run app --with-gui --gunicorn --host 0.0.0.0
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "http://localhost:8000/-/health"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s

  # nomad remote tools hub (JupyterHUB, e.g. for AI Toolkit)
  north:
    restart: always
    # restart: unless-stopped
    build:
      context: ./packages/nomad-north/images/hub/
      dockerfile: Dockerfile
      args:
        JUPYTERHUB_VERSION: latest
    platform: linux/amd64
    container_name: nomad_north
    # environment:
    #   NOMAD_SERVICE: nomad_north
    #   NOMAD_NORTH_DOCKER_NETWORK: nomad_network
    #   NOMAD_NORTH_HUB_CONNECT_IP: north
    #   NOMAD_NORTH_HUB_IP: "0.0.0.0"
    #   NOMAD_NORTH_HUB_HOST: north
    #   NOMAD_SERVICES_API_HOST: app
    #   NOMAD_FS_EXTERNAL_WORKING_DIRECTORY: "$PWD"
    #   NOMAD_RABBITMQ_HOST: rabbitmq
    #   NOMAD_ELASTIC_HOST: elastic
    #   NOMAD_MONGO_HOST: mongo
    # env_file:
    #   - ./.env
    # volumes:
    #   # - ./configs/nomad.yaml:/app/nomad.yaml
    #   - ./.volumes/fs:/app/.volumes/fs
    #   - /var/run/docker.sock:/var/run/docker.sock
    # user: "1000:991"
    # command: python -m nomad.cli admin run hub
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "http://localhost:8081/nomad-oasis/north/hub/health"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    volumes:
      # The JupyterHub configuration file
      # - "./images/hub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro"
      - "./profile_list_generated.yaml:/srv/jupyterhub/profile_list.yaml:ro"
      # Bind Docker socket on the host so we can connect to the daemon from
      # within the container
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
      # Bind Docker volume on host for JupyterHub database and cookie secrets
      - "nomad_north:/data"
    ports:
      - "9000:9000"
      - "8081:8081"
    env_file:
      - ./.env.north
    environment:
      NOMAD_API_URL: "http://app:8000/nomad-oasis/api/v1"
      DOCKER_PREFIX: "nomad-oasis-north"
      DOCKER_NETWORK: "nomad_oasis_network"
    depends_on:
      app:
        condition: service_healthy


  # nomad logtransfer
  # to enable the logtransfer service run "docker compose --profile with_logtransfer up"
  logtransfer:
    restart: unless-stopped
    image: ghcr.io/fairmat-nfdi/nomad-distro-template:main
    platform: linux/amd64
    container_name: nomad_logtransfer
    environment:
      NOMAD_SERVICE: nomad_logtransfer
      NOMAD_ELASTIC_HOST: elastic
      NOMAD_MONGO_HOST: mongo
    env_file:
      - ./.env
    depends_on:
      elastic:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      # - ./configs/nomad.yaml:/app/nomad.yaml
      - ./.volumes/fs:/app/.volumes/fs
    command: python -m nomad.cli admin run logtransfer
    profiles: ["with_logtransfer"]

  # nomad proxy (a reverse proxy for nomad)
  proxy:
    restart: unless-stopped
    image: docker.io/nginx:1.27.4-alpine
    container_name: nomad_proxy
    command: nginx -g 'daemon off;'
    volumes:
      # Shared config
      - ./configs/nginx_base_conf:/etc/nginx/conf.d/nginx_base_conf:ro
      # HTTP
      - ./configs/nginx_http.conf:/etc/nginx/conf.d/default.conf:ro
      # HTTPS (you need to have an SSL certificate)
      # - ./configs/nginx_https.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
      worker:
        condition: service_started # TODO: service_healthy
      north:
        condition: service_healthy
    ports:
      - 80:80
      - 443:443


volumes:
  mongo:
    name: "nomad_mongo"
  elastic:
    name: "nomad_elastic"
  rabbitmq:
    name: "nomad_rabbitmq"
  keycloak:
    name: "nomad_keycloak"
  postgresql:
    name: "nomad_postgresql"
  nomad_north:

networks:
  default:
    name: nomad_oasis_network